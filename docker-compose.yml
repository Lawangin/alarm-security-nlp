services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
      - NLP_STRATEGY=rule-based
      - CORS_ORIGIN=http://localhost:3000
      # LLM settings (uncomment for Phase 9)
      # - NLP_STRATEGY=hybrid
      # - LLM_API_KEY=your-key-here
      # - LLM_MODEL=claude-sonnet-4-6
      # - CONFIDENCE_THRESHOLD=0.85
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
